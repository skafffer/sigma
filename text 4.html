<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isaac | boy.rip</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#050505;
  color:white;
  overflow:hidden;
}

#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

/* top header */
.header{
  position:fixed;
  top:30px;
  text-align:center;
  z-index:2;
}

.name{
  font-size:48px;
  font-weight:600;
}

.domain{
  opacity:.5;
  font-size:16px;
  margin-top:4px;
}

/* typing title under name */
.title{
  margin-top:12px;
  font-size:18px;
  color:#b78cff;
  letter-spacing:1px;
}

.cursor{
  display:inline-block;
  width:2px;
  height:18px;
  background:#b78cff;
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0}
}

/* icon grid */
.grid{
  margin-top:140px; /* space from top header */
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(60px,1fr));
  gap:24px;
  justify-items:center;
  align-items:center;
  z-index:2;
}

.square{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.2s;
}

.square:hover{
  transform:scale(1.3);
}

/* icons only */
.square img{
  width:60px;
  height:60px;
  filter:invert(1);
}

/* toast */
.toast{
  position:fixed;
  bottom:40px;
  background:rgba(25,25,25,.8);
  border:1px solid #8b5cf6;
  padding:12px 18px;
  border-radius:8px;
  font-size:14px;
  opacity:0;
  transform:translateY(20px);
  transition:.3s;
  z-index:3;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>
<div id="particles"></div>

<!-- top header -->
<div class="header">
  <div class="name">Isaac</div>
  <div class="domain">boy.rip</div>
  <div class="title">
    <span id="typing"></span><span class="cursor"></span>
  </div>
</div>

<!-- icon grid -->
<div class="grid">
  <div class="square" onclick="copy('telegram_user')">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg" alt="Telegram">
  </div>
  <div class="square" onclick="openLink('https://roblox.com/users/YOURID')">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg" alt="Roblox">
  </div>
  <div class="square" onclick="openLink('https://spotify.com/user/YOURNAME')">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="Spotify">
  </div>
  <div class="square" onclick="openLink('https://tiktok.com/@USERNAME')">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" alt="TikTok">
  </div>
  <div class="square" onclick="copy('snap_user')">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/snapchat.svg" alt="Snapchat">
  </div>
  <div class="square" onclick="copy('your@email.com')">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg" alt="Gmail">
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* typing title */
const text = "Fullstack Developer";
let i = 0;
function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type,80);
  }
}
type();

/* copy */
function copy(text){
  navigator.clipboard.writeText(text);
  let toast=document.getElementById("toast");
  toast.innerText="Copied: "+text;
  toast.classList.add("show");
  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);
}

function openLink(url){
  window.open(url,"_blank");
}

/* particles */
tsParticles.load("particles",{
  particles:{
    number:{value:70},
    color:{value:"#8b5cf6"},
    links:{enable:true,distance:140,color:"#8b5cf6",opacity:0.3},
    move:{enable:true,speed:1},
    opacity:{value:0.5},
    size:{value:2}
  },
  background:{color:"transparent"}
});
</script>

</body>
</html>
